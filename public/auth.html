<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - GROW YOUR CROPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(27, 94, 32, 0.8), rgba(27, 94, 32, 0.85)), url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            padding: 2rem 1rem;
            position: relative;
        }

        .auth-box {
            background: var(--bg-surface);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-header .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            text-decoration: none;
        }
        
        .auth-header .logo i {
            color: var(--primary-color);
            margin-right: 0.5rem;
        }

        .auth-header h3 {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
            margin: 0;
        }

        /* Input Group with Icons */
        .input-group {
            margin-bottom: 1.5rem;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: color var(--transition-fast);
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 3rem !important;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all var(--transition-fast);
            background-color: #f8fafc;
            box-sizing: border-box;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
        }

        .input-wrapper input:focus + i, .input-wrapper input:focus ~ i {
            color: var(--primary-color);
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        .auth-link {
            color: var(--primary-color);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .auth-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .btn-auth {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
            margin-top: 1rem;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.4);
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-color));
        }

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 20;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .back-btn:hover {
            background: rgba(0,0,0,0.5);
            transform: translateX(-5px);
            color: white;
            border-color: rgba(255,255,255,0.3);
        }

        @media (max-width: 480px) {
            .auth-box {
                padding: 2rem 1.5rem;
            }
            .back-btn {
                top: 1rem;
                left: 1rem;
            }
            .form-row {
                flex-direction: column;
                gap: 0 !important;
            }
        }
    </style>
</head>
<body>
    
    <div class="auth-container">
        
        <!-- Back button -->
        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>

        <!-- Login Form -->
        <div class="auth-box animate-fade-in" id="login-box">
            <!-- Global Message Box for Auth -->
            <div id="auth-message-login" style="display: none; padding: 1rem; margin-bottom: 1.5rem; border-radius: 0.5rem; text-align: center; font-size: 0.9rem; z-index: 10; position: relative;"></div>

            <div class="auth-header">
                <a href="index.html" class="logo">
                    <i class="fa-solid fa-leaf"></i>
                    <span>Grow Your Crops</span>
                </a>
                <h3>Welcome Back, Farmer</h3>
            </div>
            
            <div class="auth-body">
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" required placeholder="farmer@example.com">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" required placeholder="••••••••">
                        </div>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.9rem;">
                        <label style="margin: 0; cursor: pointer; display: flex; align-items: center; color: var(--text-muted); font-weight: normal;">
                            <input type="checkbox" style="width: auto; margin-right: 0.5rem;"> Remember me
                        </label>
                        <a href="#" class="auth-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn-auth" id="login-btn">Sign In</button>
                </form>
            </div>
            <div class="auth-footer">
                Don't have an account? <span class="auth-link" onclick="toggleAuth('register')">Create one now</span>
            </div>
        </div>

        <!-- Register Form (Hidden initially) -->
        <div class="auth-box animate-fade-in" id="register-box" style="display: none;">
            <!-- Global Message Box for Auth -->
            <div id="auth-message-register" style="display: none; padding: 1rem; margin-bottom: 1.5rem; border-radius: 0.5rem; text-align: center; font-size: 0.9rem; z-index: 10; position: relative;"></div>

            <div class="auth-header">
                <a href="index.html" class="logo">
                    <i class="fa-solid fa-leaf"></i>
                    <span>Grow Your Crops</span>
                </a>
                <h3>Create Your Free Account</h3>
            </div>
            <div class="auth-body">
                <form id="register-form">
                    <div class="form-row" style="display: flex; gap: 1rem;">
                        <div class="input-group" style="flex: 1;">
                            <label for="fname">First Name</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-user"></i>
                                <input type="text" id="fname" required placeholder="Ram">
                            </div>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label for="lname">Last Name</label>
                            <div class="input-wrapper">
                                <i class="fa-regular fa-user"></i>
                                <input type="text" id="lname" required placeholder="Kumar">
                            </div>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="reg-email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="reg-email" required placeholder="farmer@example.com">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="reg-password" required placeholder="Create a strong password">
                        </div>
                    </div>
                    <button type="submit" class="btn-auth" id="register-btn">Sign Up <i class="fa-solid fa-arrow-right"></i></button>
                </form>
            </div>
            <div class="auth-footer">
                Already have an account? <span class="auth-link" onclick="toggleAuth('login')">Sign In here</span>
            </div>
        </div>
    </div>

    <script>
        let currentAuthView = 'login'; // Track current form

        function toggleAuth(type) {
            const login = document.getElementById('login-box');
            const register = document.getElementById('register-box');
            showMessage('', 'none');
            
            if(type === 'register') {
                login.style.display = 'none';
                register.style.display = 'block';
                currentAuthView = 'register';
            } else {
                login.style.display = 'block';
                register.style.display = 'none';
                currentAuthView = 'login';
            }
        }

        function showMessage(msg, type) {
            const msgBox = document.getElementById(currentAuthView === 'login' ? 'auth-message-login' : 'auth-message-register');
            if(type === 'none') {
                msgBox.style.display = 'none';
                return;
            }
            msgBox.style.display = 'block';
            msgBox.innerText = msg;
            if(type === 'error') {
                msgBox.style.background = '#fef2f2';
                msgBox.style.color = '#991b1b';
                msgBox.style.border = '1px solid #f87171';
            } else {
                msgBox.style.background = '#f0fdf4';
                msgBox.style.color = '#166534';
                msgBox.style.border = '1px solid #4ade80';
            }
        }

        // Login Submit
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing In...';
            btn.disabled = true;

            const payload = {
                action: 'login',
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                if(response.ok) {
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.php', 1000);
                } else {
                    showMessage(data.message || 'Login failed', 'error');
                    btn.innerHTML = 'Sign In';
                    btn.disabled = false;
                }
            } catch(err) {
                showMessage('Network error.', 'error');
                btn.innerHTML = 'Sign In';
                btn.disabled = false;
            }
        });

        // Register Submit
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating Account...';
            btn.disabled = true;

            const payload = {
                action: 'register',
                first_name: document.getElementById('fname').value,
                last_name: document.getElementById('lname').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value
            };

            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if(response.ok) {
                    showMessage('Account created! Please sign in.', 'success');
                    setTimeout(() => toggleAuth('login'), 1500);
                } else {
                    showMessage(data.message || 'Registration failed', 'error');
                }
            } catch(err) {
                showMessage('Network error.', 'error');
            }
            btn.innerHTML = 'Sign Up <i class="fa-solid fa-arrow-right"></i>';
            btn.disabled = false;
        });
    </script>
</body>
</html>
